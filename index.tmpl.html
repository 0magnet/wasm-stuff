height: 100%;

color: white;

<script title="wasm_exec.js">
{{.Page.WasmExecJs}}
</script>
<script>
if (!WebAssembly.instantiateStreaming) {
  WebAssembly.instantiateStreaming = async (resp, importObject) => {
    const source = await (await resp).arrayBuffer();
    return await WebAssembly.instantiate(source, importObject);
  };
}
const go = new Go();
let mod, inst;

const wasmBase64 = `{{.Page.WasmBase64}}`;
const wasmBinary = Uint8Array.from(atob(wasmBase64), c => c.charCodeAt(0)).buffer;

console.log("[WASM-STUFF] Loading {{.Page.Title}} WASM...");
WebAssembly.instantiate(wasmBinary, go.importObject).then((result) => {
  mod = result.module;
  inst = result.instance;
  console.log("[WASM-STUFF] {{.Page.Title}} WASM instantiated, starting...");
  run().then((result) => {
    console.log("[WASM-STUFF] {{.Page.Title}} WASM finished: ", result)
  }, (failure) => {
    console.error("[WASM-STUFF] {{.Page.Title}} WASM failed: ", failure)
  })
});
async function run() {
  await go.run(inst);
  inst = await WebAssembly.instantiate(mod, go.importObject);
}
</script>
